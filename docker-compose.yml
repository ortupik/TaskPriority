version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fieldpulse
      POSTGRES_USER: fieldpulse
      POSTGRES_PASSWORD: fieldpulse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fieldpulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO (S3-compatible object storage) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket init (one-shot) ──────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/fieldpulse &&
        mc anonymous set download local/fieldpulse/job-photos/thumbs &&
        echo 'MinIO bucket ready'
      "

  # ── Django API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SECRET_KEY: "dev-secret-change-in-production-use-long-random-string"
      DEBUG: "true"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,api"
      DB_NAME: fieldpulse
      DB_USER: fieldpulse
      DB_PASSWORD: fieldpulse
      DB_HOST: db
      DB_PORT: "5432"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: fieldpulse
      MINIO_ENDPOINT: "http://minio:9000"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8080"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py seed --jobs 120 &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --reload
      "

volumes:
  postgres_data:
  minio_data:
