name: fieldpulse
description: Mobile job management for field service technicians.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Local storage
  drift: ^2.18.0
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.22
  path_provider: ^2.1.3
  path: ^1.9.0

  # Secure storage (tokens)
  flutter_secure_storage: ^9.0.0

  # Biometric auth
  local_auth: ^2.2.0

  # Camera & images
  camera: ^0.11.0+1
  image: ^4.1.7
  exif: ^3.3.0
  permission_handler: ^11.3.1

  # Maps
  url_launcher: ^6.2.6

  # Push notifications
  firebase_core: ^2.32.0
  firebase_messaging: ^14.9.3

  # UI utilities
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
